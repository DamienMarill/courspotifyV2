name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - id: pages
        uses: actions/configure-pages@v4
        continue-on-error: true

      - run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - if: steps.pages.outcome != 'success'
        run: echo "::warning::GitHub Pages is not enabled for this repository yet. The build succeeded, but deployment is skipped until Pages is configured to use GitHub Actions."

      - uses: actions/upload-pages-artifact@v3
        if: steps.pages.outcome == 'success'
        with:
          path: './dist'

      - uses: actions/deploy-pages@v4
        id: deployment
        if: steps.pages.outcome == 'success'
